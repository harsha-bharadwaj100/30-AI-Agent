<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Voice Agent</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-Novam: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #6b7280;
            font-size: 1.1rem;
            margin-Novam: 40px;
            font-weight: 400;
        }

        .voice-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .voice-button:hover:not(:disabled) {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(102, 126, 234, 0.4);
        }

        .voice-button:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .voice-button.recording {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            animation: pulse 2s ease-in-out infinite;
        }

        .voice-button.processing {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            animation: spin 2s linear infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3), 0 0 0 0 rgba(239, 68, 68, 0.7);
            }

            50% {
                box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3), 0 0 0 20px rgba(239, 68, 68, 0);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .status {
            margin-top: 30px;
            font-size: 1.1rem;
            font-weight: 500;
            min-height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .status.error {
            color: #ef4444;
            font-weight: 600;
        }

        .rag-panel {
            margin-top: 28px;
            text-align: left;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 14px;
        }

        .rag-panel h3 {
            font-size: 0.95rem;
            margin-bottom: 8px;
            color: #374151;
        }

        .upload-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }

        .upload-row input[type="file"] {
            flex: 1;
        }

        .upload-row button {
            border: none;
            background: #2563eb;
            color: white;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
        }

        .upload-row button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .upload-status {
            font-size: 0.85rem;
            color: #475569;
            min-height: 18px;
            margin-bottom: 8px;
        }

        .sources-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 110px;
            overflow: auto;
        }

        .sources-list li {
            font-size: 0.82rem;
            background: #eef2ff;
            border-radius: 8px;
            padding: 6px 8px;
            color: #1f2937;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Hide default audio player */
        audio {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>AI Voice Agent</h1>
        <p class="subtitle">Click the mic to start a conversation</p>

        <button class="voice-button" id="voice-button" title="Start or stop voice recording">
            <i class="fas fa-microphone" id="button-icon"></i>
        </button>

        <div class="status" id="status">
            Click to speak
        </div>

        <div class="rag-panel">
            <h3>Knowledge Base (TXT / MD)</h3>
            <div class="upload-row">
                <label for="doc-upload" class="sr-only">Upload knowledge document</label>
                <input type="file" id="doc-upload" accept=".txt,.md" title="Upload .txt or .md knowledge file" />
                <button id="upload-button" type="button">Upload</button>
            </div>
            <div id="upload-status" class="upload-status"></div>
            <h3>Sources Used</h3>
            <ul id="sources-list" class="sources-list">
                <li>No citations yet.</li>
            </ul>
        </div>

        <audio id="response-audio" autoplay></audio>
    </div>

    <script src="{{ url_for('static', path='script.js') }}"></script>
</body>

</html>
